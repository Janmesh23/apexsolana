name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate-pr-scope:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.check.outputs.issue_number }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR Scope
        id: check
        run: |
          changed_files=$(git diff --name-only origin/main...${{ github.sha }})
          issue_count=0
          issue_file=""
          
          for file in $changed_files; do
            if [[ "$file" == rust-learnings/tests/* ]]; then
              echo "::error::⚠️ The tests/ directory is protected. Please revert any changes you made there."
              exit 1
            fi
            
            if [[ "$file" =~ ^rust-learnings/src/issues/0[0-9]+_.*\.rs$ ]]; then
              issue_count=$((issue_count + 1))
              issue_file=$file
            fi
          done
          
          if [[ $issue_count -gt 1 ]]; then
            echo "::error::Please keep each PR to a single issue. We detected changes to multiple issue files."
            exit 1
          fi
          
          if [[ $issue_count -eq 0 ]]; then
            echo "::error::No issue files in src/issues/ were changed."
            exit 1
          fi
          
          # Extract just the "01" part
          issue_num=$(basename "$issue_file" | cut -d'_' -f1)
          echo "issue_number=$issue_num" >> $GITHUB_OUTPUT

  fmt:
    needs: validate-pr-scope
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-learnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    needs: validate-pr-scope
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-learnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy -- -D warnings

  test:
    needs: [fmt, clippy, validate-pr-scope]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-learnings
    steps:
      - uses: actions/checkout@v4
      - name: Checkout Private Tests
        uses: actions/checkout@v4
        with:
          repository: Janmesh23/apexsolana-tests
          token: ${{ secrets.PRIVATE_TESTS_TOKEN }}
          path: rust-learnings/tests
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        env:
          ISSUE_NUM: ${{ needs.validate-pr-scope.outputs.issue_number }}
        run: cargo test $ISSUE_NUM
