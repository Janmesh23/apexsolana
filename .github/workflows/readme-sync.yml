name: Sync README Curriculum Table

on:
  issues:
    types: [opened, assigned, unassigned, closed, reopened]
  pull_request:
    types: [opened, closed]
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull_requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Sync Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python rust-learnings/scripts/sync_readme.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rust-learnings/README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update curriculum table [skip ci]" && git push)
